##########################################
### Global parameters for all projects ###
##########################################
parameters: &global_params 
  # Either a file with individual in the 1st column, population in the 2nd column
  popmap: "data/popmap.txt"
  # or a separator to extract population codes from individual IDs
  popseparator: "-" # e.g. "ind1-pop1", separator is "-"
  # (if both popdata and popseparator are provided, popmap file takes precedence)
  
  ## Population data file
  # This is used for analyses that incorporate geographic information,
  # such as plotting structure results on a map or coloring PCA plots by geography.
  # A file with the following columns:
  # - Site (population)
  # - Lat (latitude - x coordinate; decimal degrees)
  # - Lon (longitude - y coordinate; decimal degrees)
  # - optional additional columns with population stratification (e.g. region, mountain range, etc.)
  # Example:
  # Site Lat  Lon Region
  # pop1  52.23 21.01 region1
  # pop2  51.50 -0.13 region2
  popdata: "data/popdata.txt"
  
  ## Preprocessing parameters
  #
  # Pipeline order:
  # 1. Sort, bgzip, and index the raw ipyrad VCF.
  # 2. Optionally subset samples with projects.<project>.samples.
  # 3. Optionally remove close relatives with KING.
  # 4. Filter variants by missingness.
  # 5. Keep biallelic SNPs with MAC > 1 and optional MAF filtering.
  # 6. Choose the downstream SNP set: one SNP per RAD locus, LD pruning, or all biallelic SNPs.
  #
  # Step 2 is project-specific:
  #   samples: "ind001,ind002,ind003"  # optional comma-separated VCF sample IDs
  #
  # Step 3: relatedness filtering happens before variant missingness filtering so
  # missingness and allele-frequency filters are calculated after related samples are removed.
  relatedness_filtering:
    enabled: false            # enable KING-based relatedness filtering in preprocessing
    king_threshold: 0.0884    # 2nd-degree relatives threshold
    mac_threshold: 1          # minimum MAC used for KING calculation
    group_by: ["Region"]      # grouping columns for removed-individual plots

  # Steps 4-5: variant-level filtering before thinning/LD pruning.
  # f_missing is the maximum allowed fraction of missing genotypes per variant.
  #   1.0 = keep variants regardless of missingness; 0.5 = require data in >=50% of samples.
  # maf is applied after missingness filtering while selecting biallelic SNPs with MAC > 1.
  vcf_filtering:
    f_missing: 1.0            # max missing-data threshold; 1.0 disables missingness filtering
    maf: 0.0                  # minimum minor allele frequency filter

  # Step 6: choose the final SNP set used by most downstream analyses.
  # thinning = one SNP per RAD fragment; ld_pruning = PLINK LD-pruned set; none = all biallelic SNPs.
  thinning_strategy: "thinning"  # thinning|ld_pruning|none

  # Settings used only when thinning_strategy: "thinning".
  # Many analyses require unlinked SNPs; this keeps one SNP per RAD fragment.
  vcf_thinning:
    min_coverage: 0          # minimum number of samples with data
    method: "max_coverage"   # selection method: random, max_coverage, or weighted
    ties: "random"           # handle ties in max_coverage: first or random
    ns_tag: "NS"             # INFO field tag for number of samples with data
    id_pattern: "loc(\\d+)_" # regex pattern to extract RAD fragment ID

  # Settings used only when thinning_strategy: "ld_pruning".
  # Window and step sizes are PLINK-style LD-pruning window parameters.
  ld_pruning:
    r2: 0.5                   # LD r^2 threshold
    window_size: 50           # LD window size
    step_size: 5              # LD step size
  
  ## Analysis method overview
  # structure: Bayesian ancestry clustering with STRUCTURE across k_values.
  # faststructure: Fast variational ancestry clustering using PLINK input.
  # admixture: Maximum-likelihood ancestry clustering with CV error per K.
  # evaladmix: Residual-correlation diagnostics for ancestry model fit.
  # tess3: Spatially regularized ancestry estimation with tess3r.
  # construct: Spatial population structure model with conStruct.
  # dapc: Discriminant analysis of principal components clustering.
  # spca: Spatial PCA combining genetic variance and spatial autocorrelation.
  # pcaone: Fast PCA from the final PLINK SNP dataset.
  # emupca: Standalone EMU PCA for low-coverage or uncertain genotypes.
  # pcaone_emu: PCAone EMU mode for PCA with missing genotype modelling.
  # pcaone_miss: PCAone sensitivity runs across missing-data thresholds.
  # vcf2pcacluster: PCA/clustering with VCF2PCACluster internal SNP filters.
  # gen_dist: Pairwise Euclidean and p-distance matrices from SNP genotypes.
  # pcoa: Principal coordinates analysis from the Euclidean distance matrix.
  # neighbornet: Split network from p-distance genetic distances.
  # pixy: Nucleotide diversity, FST, and dXY from variant/invariant sites.
  # relatedness: Pairwise kinship/IBD estimates and relatedness network plots.
  # roh: Runs of homozygosity calls and group summaries.
  # amova: AMOVA variance partitioning across metadata strata.
  # mapi: Spatial MAPI maps of unusually high/low genetic distances.
  # genome_scan: Sliding-window FST, pi, and dXY between two metadata groups.
  # iqtree: Maximum-likelihood phylogeny from the ipyrad PHYLIP alignment.
  # iqtree_trimal: trimAl alignment trimming followed by IQ-TREE inference.
  # iqtree_robust: Robust IQ-TREE output selection based on support threshold.
  # fineradstructure: RADpainter/fineRADstructure coancestry and clustering.
  # treemix: OrientAGraph historical population graph with migration edges from allele counts.

  ## Shared K values for clustering methods
  # Common K values to test for population structure (STRUCTURE, fastStructure,
  # ADMIXTURE, tess3r, conStruct, and DAPC where applicable):
  k_values: [1, 2, 3]

  ## Shared choose-K plot parameters (Evanno-style model-comparison figures)
  # Used by STRUCTURE Evanno, ADMIXTURE CV, tess3r CV, conStruct choose-K, and DAPC BIC plots.
  choose_k_plot:
    width: 10                       # plot width in inches
    height: 5                       # plot height in inches
    dpi: 300                        # dots per inch (resolution)

  ## Shared map background parameters (used by all mapping functions)
  # This section is read by mapmixture/population_map/pixy/dapc and other map rules.
  map_boundary: null                # optional map boundary extent e.g. c(xmin=18.5, xmax=23.4, ymin=48.8, ymax=49.8)

  map_background:
    width: 10                       # plot width in inches
    height: 8                       # plot height in inches
    dpi: 300                        # dots per inch (resolution)
    crs: 4326                       # coordinate reference system (4326 = WGS84 lat/lon)
    basemap: null                   # background style (e.g. null, ne1, gray_earth, elevation)
    land_colour: "#d9d9d9"          # color for land masses
    sea_colour: "#deebf7"           # color for water bodies
    expand: false                   # expand map to fill plotting area (true/false)
    arrow: true                     # show north arrow (true/false)
    arrow_size: 1                   # size of north arrow
    arrow_position: "tl"            # position of north arrow (tl/tr/bl/br)
    scalebar: true                  # show scale bar (true/false)
    scalebar_size: 1                # size of scale bar
    scalebar_position: "tl"         # position of scale bar (tl/tr/bl/br)
    plot_title: ""                  # title for the plot
    axis_title_size: 10             # font size for axis titles
    axis_text_size: 8               # font size for axis text
    basemap_border: true            # show border around basemap (true/false)
    basemap_border_col: "black"     # color of basemap border
    basemap_border_lwd: 0.1         # line width of basemap border
    elevatr_z: null                 # optional elevation zoom level (null = auto)


  ## Mapmixture plotting parameters
  # These parameters control STRUCTURE/ADMIXTURE pie plots and barplots.
  # NOTE: YAML parsers generally accept uppercase/lowercase booleans and nulls;
  # this example config uses lowercase true/false/null consistently.
  mapmixture:
    pie_size: 1                     # size of pie charts on map
    pie_border: 0.2                 # thickness of pie chart borders
    pie_border_col: "black"         # color of pie chart borders
    pie_opacity: 1                  # opacity of pie charts (0-1)
    legend: false                   # show legend (true/false)

    site_dividers: true             # show dividers between sites
    divider_width: 0.4              # width of site dividers
    site_order: null                # custom site order as list, e.g. ["Site1", "Site2", "Site3"]
    population_sort_by: null        # indpopdata column to sort populations by; null = alphabetical
    flip_axis: false                # flip barplot axis
    site_labels_angle: 90           # rotation angle for site labels in barplots
    population_labels: ["Site"]     # null hides labels; otherwise use one or more indpopdata columns, e.g. ["Site"] or ["Region", "Site"]
    # Structure color palette 
    structure_colors:
      - "#E41A1C"  # red
      - "#377EB8"  # blue
      - "#4DAF4A"  # green
      - "#984EA3"  # purple
      - "#FF7F00"  # orange
      - "#FFFF33"  # yellow
      - "#A65628"  # brown
      - "#F781BF"  # pink
      - "#999999"  # gray
      - "#FFFFFF"  # white
      - "#000000"  # black

  ## Population map plotting parameters
  # Note: shared map appearance comes from map_background above.
  population_map:
    # Point styling
    point_size: 1                # size of population points
    point_color: "black"         # color of population points
    point_shape: 19              # shape of points (19 = filled circle)
    show_points: true            # show population points (true/false)
    # Label styling
    label_size: 3                # font size for labels
    label_color: "black"         # color of labels
    label_fontface: "plain"      # font face: plain, bold, italic, bold.italic
    show_labels: true            # show population labels (true/false)
    # ggrepel parameters for label positioning
    force: 10                    # force of repulsion between labels
    force_pull: 1                # force pulling labels toward points
    max.overlaps: Inf            # maximum number of overlapping labels to show (Inf = show all labels)
    min.segment.length: 0.5      # minimum length of leader line segment (in map units)
    segment.color: "black"      # color of leader lines
    segment.size: 0.2            # line width of leader lines

  ## MAPI parameters
  # Spatial MAPI maps highlight areas where genetic distances are unusually high or low.
  mapi:
    n_permutations: 1000        # number of permutations for significance testing
    grid_halfwidth: 100000      # grid cell halfwidth in meters (null for auto-estimation)
    crs_projected: "EPSG:8857"  # projected CRS for distance calculations ("EPSG:8857" = Equal Earth, EPSG:3035 = ETRS89 / ETRS-LAEA Europe, EPSG:2180 = Poland CS2000)
    crs_geographic: 4326        # geographic CRS for lat/lon coordinates (4326 = WGS84)
    alpha: 0.05                 # significance level for upper/lower tail identification
    fill_var: "avg_value"       # variable used to fill MAPI grid cells in plots
    point_alpha: 0.6            # opacity of sampling points on MAPI maps
    tail_linewidth: 0.4         # line width for upper/lower MAPI tail outlines
    upper_tail_color: "#B2182B" # color for upper tails (high resistance; muted red)
    lower_tail_color: "#1B7837" # color for lower tails (low resistance; muted green)

  ## Structure parameters
  # Bayesian ancestry clustering with STRUCTURE across k_values.
  # More run parameters can be tweaked by modifying `data/mainparams` and `data/extraparams`
  # Numbers of individuals and loci are automatically inferred from .ustr file so this does not need to be changed.
  structure:
    replicates: 10       # number of replicates for structure
  
  ## FastStructure parameters (defaults shown)
  # Fast variational ancestry clustering using PLINK input.
  faststructure:
    tol: "10e-6"        # convergence criterion
    prior: "simple"     # prior choice: simple or logistic

  ## tess3r parameters (package defaults shown)
  # Spatial ancestry estimation using geographically constrained matrix factorization.
  # tess3r is fast enough for large SNP sets and is useful for smooth ancestry maps;
  # use conStruct when the goal is explicitly to separate discrete structure from IBD.
  # Genotypes are converted from VCF GT fields to alternate-allele dosages (0..ploidy;
  # same matrix layout as tess3r/lfmm; see tess3r vignette).
  tess3:
    ploidy: 2                 # tess3() ploidy: allele dosage range 0..ploidy (required; no package default; use 1 for haploids or inbred diploids coded as haploid)
    method: "projected.ls"    # tess3() method: "projected.ls" (fast default) or "qp" (slower quadratic-programming sensitivity check)
    replicates: 1             # tess3() rep: independent algorithm starts per K
    max_iteration: 200        # tess3() max.iteration: maximum ALS/projected least-squares iterations
    tolerance: 1.0e-5         # tess3() tolerance: convergence tolerance
    mask: 0                   # tess3() mask: proportion of genotypes masked for cross-validation (0 = disabled; set >0 with crossvalid:true for masked CV)
    crossvalid: false         # plot.tess3 crossvalid: summarise masked-genotype CV in choose-K plot (requires mask > 0)
    crossentropy: false       # plot.tess3 crossentropy: use cross-entropy instead of RMSE in choose-K plot
    map_method: "map.max"     # plot.tess3Q method: "map.max" (union of component surfaces) or "map.all" (all components)
    map_resolution: [300, 300]  # plot.tess3Q/ggtess3Q resolution c(rx, ry): interpolation grid dimensions
    interpolation_knots: 10   # FieldsKrigModel() knots for tess3r interpolated maps (plot.tess3Q default)
    ggmap_point_size: 0.8     # sample-point size on ggtess3Q + mapmixture basemap maps (workflow default; not a tess3r package argument)
  
  ## conStruct parameters
  # Spatial population structure model where covariance can decay with geography.
  # NOTE: conStruct is computationally heavy. Run it on a SMALL, aggressively
  # thinned SNP set (~1,000-5,000 loci); thin the full marker set for conStruct
  # and use tess3r on the fuller set for visualisation. See the README conStruct note.
  construct:
    n_chains: 2        # independent MCMC chains; >=2 is required to assess convergence across chains (1 cannot)
    n_iterations: 50000  # MCMC iterations per chain; a safer minimum than 10000. Increase for final runs and verify convergence from trace plots
    geoDist: null      # optional pre-computed geographic distance matrix (null = compute from coords)
    coords: null       # optional coordinate matrix (null = use from indpopdata)
    save.files: true   # whether to save intermediate files
    crs: 4326          # coordinate reference system for plotting (4326 = WGS84)
  
  ## DAPC parameters
  # Discriminant analysis of principal components for genotype-based clustering.
  # K range is driven by the top-level k_values list (K >= 2; K=1 is skipped as DAPC requires at least 2 clusters)
  dapc:
    n_pca: 50            # number of PCA axes to retain (can be informed by PCAone outputs)
    n_da: 10             # number of discriminant axes to retain
    n_rep: 30            # number of cross-validation replicates (reserved for future use)
    criterion: "diffNgroup"  # criterion for cluster selection: "diffNgroup", "min", "goesup", "smoothNgoesup", or "goodfit"

  ## sPCA parameters
  # Spatial PCA (sPCA; adegenet 2.1.x, Jombart et al. 2008). Requires analyses.spca: true and
  # popdata with Ind, Lat, Lon (written to indpopdata.txt). Ordinates samples using Moran's
  # eigenvector maps so axes reflect both genetic variance and spatial autocorrelation.
  # Positive eigenvalues = global structure (smooth clines); negative = local (fine patches).
  # Use the eigenvalue barplot and screeplot outputs to tune nfposi / nfnega before re-running.
  # Tutorial: https://adegenet.r-forge.r-project.org/files/tutorial-spca.pdf
  spca:
    # Optional PCA reduction on the genotype matrix before sPCA (reduces runtime on large SNP sets).
    # null = use all loci; integer = number of PCA axes passed to spca() when supported.
    n_pca: null
    # Number of global sPCA axes to retain (positive eigenvalues; broad spatial patterns).
    nfposi: 2
    # Number of local sPCA axes to retain (negative eigenvalues; short-range differentiation).
    nfnega: 2
    # Neighbour graph from indpopdata Lon/Lat (adegenet::chooseCN, forwarded to spca()).
    # type 1 = Delaunay triangulation: flexible default, often a good first pass; no extra keys.
    # type 2 = Gabriel graph: stricter local graph; edges are kept only when no sample lies in
    #          the circle defined by a pair of points; no extra keys.
    # type 3 = Relative neighbour graph: even sparser local graph; keeps edges only when two
    #          samples are closer to each other than to any third sample; no extra keys.
    # type 4 = Minimum spanning tree: sparsest connected graph; useful to force connectivity but
    #          can overemphasize chain-like links; no extra keys.
    # type 5 = Distance band: links samples whose pairwise distance is in [d1, d2]; set d1 and d2.
    #          d2 can also be "dmin" (smallest threshold giving every sample a neighbour) or
    #          "dmax" (threshold connecting all samples), following adegenet::chooseCN.
    # type 6 = K nearest neighbours: each sample is linked to its k nearest samples; set k.
    # type 7 = Inverse-distance weights: all samples are neighbours, weighted by inverse distance;
    #          set a (distance exponent) and dmin (minimum distance to avoid infinite weights).
    # Distances for types 5–7 use the same units as Lon/Lat in popdata (degrees for WGS84;
    # prefer projected metre coordinates before using absolute distance thresholds).
    type: 1
    # If multiple individuals share exact coordinates, adegenet graph types 1-4 fail.
    # Spread duplicated points on a small circle before graph construction (radius in Lon/Lat units).
    jitter_duplicate_coords: true
    jitter_sd: 0.01
    jitter_seed: 12345
    # type 5 only: minimum and maximum neighbour distances (tutorial example: d1=0, d2=2).
    d1: null
    d2: null
    # type 6 only: each sample linked to its k nearest neighbours (e.g. k: 10).
    k: null
    # type 7 only: inverse-distance weights (see ?chooseCN); rarely needed.
    a: null
    dmin: null
    # Permutations for Monte Carlo tests of global vs local spatial structure (global.rtest,
    # local.rtest). Use 999+ for publication; minimum simulated p-value is 1 / (nperm + 1).
    nperm: 999
    # How many highest MEM R^2 values are summed to form each test statistic (usually 1).
    rtest_k: 1
  spca_plot:
    # indpopdata column used to colour ggplot scatter plots of global/local scores; "none" = grey points.
    color_by: "Region"
    # Highest axis index used when drawing ggplot scatters (PC1 vs PC2 only; does not add more PDFs).
    pc_max: 4
    # Squared-loading cutoff for loadingplot allele labels; null = adegenet default (e.g. label top contributors).
    # Numeric example: 0.95 labels alleles above the 95th percentile of squared loadings on that axis.
    loading_threshold: null
  spca_map:
    # Repo-style maps of retained sPCA scores on the same basemap used by STRUCTURE/ADMIXTURE maps.
    # Each retained global/local axis gets a separate map; points are individual samples colored by score.
    point_size: 2.5
    point_alpha: 0.9
    # Diverging palette for negative/zero/positive scores.
    low_colour: "#2166AC"
    mid_colour: "white"
    high_colour: "#B2182B"
  
  ## PCAone parameters
  # Fast PCA from the final PLINK SNP dataset.
  # SVD method SVD method to be applied.
  # Options are
  # 0: the Implicitly Restarted Arnoldi Method (IRAM);
  # 1: the Yu's single-pass Randomized SVD with power iterations;
  # 2: the accurate window-based Randomized SVD method (PCAone), recommended for big data;
  # 3: the full Singular Value Decomposition (default).
  # Minimum coverage thresholds to filter VCF for missing data before PCAone analysis.
  # The VCF will be filtered for each threshold in the list and PCAone will be run
  # on each filtered dataset.
  PCAone:
    miss: [0.1, 0.2, 0.2, 0.3, 0.4, 0.5] # list of maximum missing data thresholds (F_MISSING<mincov)
    SVD_method: 3 # SVD method to use [0-3]
    EMU_SVD_method: 0 # SVD method for PCAone EMU mode [0-2]. Do not use optin 3!
    PCnum: 10     # number of principal components to compute
  # Standalone EMU PCA for low-coverage or uncertain genotypes.
  EMU:
    eig: 2        # first principal component to output (EMU --eig)
    eig_out: 10   # number of principal components to output (EMU --eig-out)
  # PCA plot params:
  pca_plot:
    pc_max: 4  # maximum PC axis number - will generate all combinations up to this value
               # e.g., pc_max=4 generates: 1/2, 2/3, 3/4, 1/3, 2/4, 1/4
    color_by: ["Region"]  # columns in popdata to color points by (must match your popdata column names!)
    pca_colors:  # color palette for categorical variables in PCA plots
      - "#E41A1C"  # red
      - "#377EB8"  # blue
      - "#4DAF4A"  # green
      - "#984EA3"  # purple
      - "#FF7F00"  # orange
      - "#FFFF33"  # yellow
      - "#A65628"  # brown
      - "#F781BF"  # pink
      - "#999999"  # gray
      - "#FFFFFF"  # white
      - "#000000"  # black
  # Pairwise kinship/IBD network plot settings for the relatedness analysis.
  relatedness_plot:
    color_by: ["none"]          # columns in indpopdata used to color network nodes; "none" disables node coloring
    plot_all: false             # when true, include unrelated individuals as isolated nodes in network plots
    relatedness_colors: null   # optional custom palette for relatedness network plots
  
  ## VCF2PCACluster parameters
  # PCA/clustering with VCF2PCACluster internal SNP filters.
  vcf2pcacluster:
    cluster_method: "Kmean"  # clustering method: EM/Kmean/DBSCAN/None
    PCnum: 10     # number of principal components to use
    SNP_filtering:
      MAF: [0, 0.001, 0.01, 0.05]   # List of min minor allele frequency filters [0.001]
      Miss: [0.3, 0.4, 0.5]  # list of max ratio of miss allele filter [0.25] but in this pipeline [0.5], might fail if too low
      Het: 1.00   # Max ratio of het allele filter [1.00]
      HWE: 0      # Exact test of Hardy-Weinberg Equilibrium for SNP Pvalue[0]
      Fchr: ""    # Filter the chromosome
    KinshipMethod: 1 # Method of Kinship [1-5],defaut [1]
                     # 1:Normalized_IBS[(Yang/BaldingNicolsKinship]
                     # 2:Centered_IBS(VanRaden)
                     # 3:IBSKinshipImpute 4:IBSKinship 5:p_dis
  
  ## Pixy parameters
  # Nucleotide diversity, FST, and dXY from variant and invariant sites.
  pixy:
    stats: ["pi"] # statistics to compute, options: pi, fst, dxy
    window_size: 10000  # size of the sliding window in bp
    bootstrap_replicates: 1000  # number of bootstrap replicates for confidence intervals
    group_by: ["Region", "Region2"]  # columns in indpopdata/popdata defining hierarchical groupings for pixy
                          # The first entry is used as the default grouping column to build the pixy popmap
                          # (i.e. the populations that pixy uses internally).
                          # The full list is used to define which groupings are available for pixy plots.
                          # Include "Site" in this list to run per-site pixy π and build the geographic π map
                          # (e.g. ["Site", "Region", "Region2"]).
    # Optional: grouping variables for Pi barplots that should be
    # produced as grouped and sorted versions.
    # If empty or omitted, only the plain Pi barplot is generated.
    arrange_by: ["Region"]
    # Map-specific parameters for pixy PI maps
    point_size: 3        # size of points on genetic diversity maps
    map_outline: true    # add point outlines (true/false, default: true)

  ## AMOVA parameters
  # AMOVA variance partitioning across metadata strata.
  amova:
    strata: ["Region", "Site"]           # e.g. ["Region", "Site"]
    nperm: 999           # number of permutations

  ## ROH parameters
  # Runs of homozygosity calls and group summaries.
  roh:
    group_by: ["Site"]   # columns in indpopdata to summarize/compare ROH

  ## Genome scan parameters
  # Sliding-window FST, pi, and dXY between two metadata groups.
  genome_scan:
    population_column: "Region"   # indpopdata column used to define comparison groups
    pop1: ""                     # first population value from population_column
    pop2: ""                     # second population value from population_column
    window_size_fst: 100         # window size for FST
    window_size_pi: 1000000      # window size for pi
    window_size_dxy: 1000000     # window size for dxy

  ## NeighborNet parameters
  # Split network from p-distance genetic distances.
  neighbornet:
    color_by: ["Region"]   # columns in indpopdata used to color tips
    width: 12            # plot width in inches
    height: 12           # plot height in inches
    dpi: 300             # plot dpi
    neigbournet_colors: null  # optional manual palette

  ## fineRADstructure parameters
  # RADpainter/fineRADstructure coancestry and clustering.
  fineradstructure:
    cluster:
      mcmc_iterations: 1000000  # -x: number of MCMC iterations for clustering
      burnin: 1000000           # -y: number of burn-in iterations
      thinning: 1000            # -z: thinning interval (sample every z iterations)
    tree:
      mcmc_iterations: 10000    # -x: number of MCMC iterations for tree building
    plot:
      max_indv: 10000           # max individuals for plotting
      max_pop: 10000            # max populations for plotting

  ## OrientAGraph parameters
  # Historical population graph inference from population allele counts.
  # OrientAGraph uses TreeMix-compatible allele-count input and output files.
  # The input converter follows the vcf2treemix.sh convention of writing ref,alt allele
  # counts per population, but groups samples from a chosen indpopdata column.
  treemix:
    population_column: "Region"       # indpopdata column defining OrientAGraph populations
    migration_edges: [0, 1, 2, 3, 4, 5]   # values passed to orientagraph -m; Evanno OptM needs m > 3
    k: 1000                         # SNP block size passed to orientagraph -k
    # Strongly recommended for OrientAGraph/TreeMix: set to a TreeMix population label
    # from treemix.populations.tsv, e.g. "A" or "Outgroup". Leave null only for exploratory unrooted runs.
    root: null                      # passed to -root; comma-delimited labels are allowed by OrientAGraph
    mlno: true                      # pass -mlno by default; false/null omits it. OrientAGraph 1.2+ source builds also accept values like "1,2", "0", or "all"
    allmigs: false                  # pass -allmigs only when true; exhaustive/original-paper mode can be slow. OrientAGraph 1.2+ source builds also accept values like "1,2" or "all"
    global: false                   # pass -global for global rearrangements
    bootstrap:
      enabled: false                # opt-in final support check; default graph/OptM fits are not bootstrapped
      migration_edges: []           # selected final m values to bootstrap, e.g. [3]
      replicates: 100               # independent -bootstrap runs per selected m for final support summaries
    seed: 12345                     # optional random seed; set null to omit
    min_called_populations: 2       # skip SNPs called in fewer populations
    optm:
      method: "Evanno"              # OptM method for choosing migration edges: Evanno, linear, or SiZer
      replicates: 5                 # independent OrientAGraph runs per m for OptM; use 10+ for final analyses
    plot:
      width: 10                     # graph/residual plot width in inches
      height: 7                     # graph/residual plot height in inches
      likelihood_width: 7           # likelihood plot width in inches
      likelihood_height: 5          # likelihood plot height in inches
      dpi: 300                      # plot resolution
      migration_arrow_length: 0.15  # arrow head size for migration edges (TreeMix default 0.05)

  ## Trimal parameters for alignment trimming before phylogenetic inference
  # trimAl removes gappy alignment sites before optional IQ-TREE inference.
  trimal:
    gt: 0.95        # gap threshold for trimming alignments (0-1 where 0=no gaps, 1=no trimming)

  ## IQ-TREE parameters
  # Maximum-likelihood phylogeny from the ipyrad PHYLIP alignment.
  iqtree:
    model: "MFP"      # substitution model, MFP for ModelFinder Plus
    bootstraps: 1000  # number of ultrafast bootstrap replicates
    robust-phy: 0.95 # robustness threshold for phylogenetic inference (0-1)
    outgroup: null    # optional rooting set for plotted/output rooted tree
    # outgroup: "sample1,sample2"  # optional rooting set for plotted/output rooted tree; when omitted, midpoint rooting is used
    support_threshold: 70  # minimum bootstrap support value to display on tree (0-100)
    # IQ-TREE plotting now writes both rooted and unrooted outputs:
    # - plots: .tree_plot.unrooted.{pdf,rds} and .tree_plot.rooted.{pdf,rds}
    # - Newick: .iqtree.unrooted.treefile and .iqtree.rooted.treefile

  ## Analysis resources
  #
  # Define computational resources for different analysis steps.
  # Memory is in MB and threads is the number of CPU threads.
  # Runtime is in minutes.
  resources: &global_resources
    default: # default resources for simple steps like file conversion
      threads: 1
      mem_mb: 8000
      runtime: 10
    default-long: # default resources for longer steps like filtering
      threads: 1
      mem_mb: 8000
      runtime: 60
    structure:
      threads: 1
      mem_mb: 8000
      runtime: 1440
    faststructure:
      threads: 4
      mem_mb: 8000
      runtime: 120
    admixture:
      threads: 4
      mem_mb: 16000
      runtime: 10
    tess3:
      threads: 4
      mem_mb: 16000
      runtime: 120
    pcaone:
      threads: 12
      mem_mb: 8000
      runtime: 30
    pcaone_emu:
      threads: 12
      mem_mb: 8000
      runtime: 10
    vcf2pcacluster:
      threads: 12
      mem_mb: 8000
      runtime: 10
    pixy:
      threads: 24
      mem_mb: 8000
      runtime: 600
    prepare_invariant_vcf:
      threads: 1
      mem_mb: 8000
      runtime: 120
    pixy_summary:
      threads: 1
      mem_mb: 8000
      runtime: 60
    iqtree:
      threads: 12
      mem_mb: 8000
      runtime: 720
    mapi:
      threads: 4
      mem_mb: 16000
      runtime: 240
    gen_dist:
      threads: 4
      mem_mb: 16000
      runtime: 120
    neighbornet:
      threads: 4
      mem_mb: 16000
      runtime: 120
    construct:
      threads: 4
      mem_mb: 16000
      runtime: 1440  # conStruct MCMC can be time-intensive
    dapc:
      threads: 4
      mem_mb: 16000
      runtime: 120   # DAPC analysis (cross-validation can add time)
    spca:
      threads: 4
      mem_mb: 16000
      runtime: 120
    amova:
      threads: 1
      mem_mb: 16000
      runtime: 120
    relatedness_filtering:
      threads: 4
      mem_mb: 16000
      runtime: 60
    fineradstructure:
      threads: 4
      mem_mb: 16000
      runtime: 1440
    treemix:
      threads: 4
      mem_mb: 16000
      runtime: 240
    roh:
      threads: 4
      mem_mb: 8000
      runtime: 120
    genome_scan:
      threads: 8
      mem_mb: 16000
      runtime: 240
    emupca:
      threads: 12
      mem_mb: 8000
      runtime: 30

##############################
### Projects configuration ###
##############################
projects:
  test:
    ipyrad_prefix: "test_data/test"
    # Optional comma-separated sample subset. Leave unset/empty to use all samples in the input VCF.
    # samples: "sample_001,sample_002,sample_003"
    ## Analysis selection - set to true/false to enable/disable
    analyses:
      structure: false        # Bayesian ancestry clustering with STRUCTURE across k_values.
      faststructure: false    # Fast variational ancestry clustering using PLINK input.
      admixture: false        # Maximum-likelihood ancestry clustering with CV error per K.
      tess3: true            # Spatially regularized ancestry estimation with tess3r.
      gen_dist: false         # Pairwise Euclidean and p-distance matrices from SNP genotypes.
      pcoa: false             # Principal coordinates analysis from the Euclidean distance matrix.
      neighbornet: false      # Split network from p-distance genetic distances.
      mapi: false             # Spatial MAPI maps of unusually high/low genetic distances.
      pcaone: false           # Fast PCA from the final PLINK SNP dataset.
      emupca: false           # Standalone EMU PCA for low-coverage or uncertain genotypes.
      vcf2pcacluster: false   # PCA/clustering with VCF2PCACluster internal SNP filters.
      pcaone_emu: false       # PCAone EMU mode for PCA with missing genotype modelling.
      pcaone_miss: false      # PCAone sensitivity runs across missing-data thresholds.
      pixy: false             # Nucleotide diversity, FST, and dXY from variant/invariant sites.
      relatedness: false      # Pairwise kinship/IBD estimates and relatedness network plots.
      roh: false              # Runs of homozygosity calls and group summaries.
      amova: false            # AMOVA variance partitioning across metadata strata.
      genome_scan: false      # Sliding-window FST, pi, and dXY between two metadata groups.
      evaladmix: false        # Residual-correlation diagnostics for ancestry model fit.
      iqtree: false           # Maximum-likelihood phylogeny from the ipyrad PHYLIP alignment.
      iqtree_trimal: false    # trimAl alignment trimming followed by IQ-TREE inference.
      iqtree_robust: false    # Robust IQ-TREE output selection based on support threshold.
      fineradstructure: false # RADpainter/fineRADstructure coancestry and clustering.
      treemix: false          # OrientAGraph historical population graph with migration edges.
      construct: false        # Spatial population structure model with conStruct.
      dapc: false             # Discriminant analysis of principal components clustering.
      spca: false              # Spatial PCA combining genetic variance and spatial autocorrelation.
    parameters:
      <<: *global_params
      popmap: "data/popmap.txt"
      popdata: "data/popdata.txt"

  # -------------------------------------------------------------------------
  # Example study template
  # -------------------------------------------------------------------------
  # Copy this block, uncomment it, rename `my_study`, and edit paths/parameters.
  # Keep only the overrides that differ from `parameters` above.
  #
  # my_study:
  #   # Prefix of ipyrad outputs. The workflow expects files such as:
  #   #   data/my_study/my_study.vcf or data/my_study/my_study.vcf.gz
  #   #   data/my_study/my_study.loci  # required by pixy/genome_scan
  #   ipyrad_prefix: "data/my_study/my_study"
  #
  #   # Optional: restrict the whole project to these sample IDs before filtering.
  #   samples: "ind001,ind002,ind003"
  #
  #   analyses:
  #     # Population structure / ancestry. `evaladmix` needs at least one ancestry method.
  #     structure: false        # Bayesian ancestry clustering with STRUCTURE across k_values.
  #     faststructure: true     # Fast variational ancestry clustering using PLINK input.
  #     admixture: true         # Maximum-likelihood ancestry clustering with CV error per K.
  #     evaladmix: true         # Residual-correlation diagnostics for ancestry model fit.
  #     tess3: false            # Spatially regularized ancestry estimation with tess3r.
  #     construct: false        # Spatial population structure model with conStruct.
  #     dapc: true              # Discriminant analysis of principal components clustering.
  #     spca: false             # Spatial PCA combining genetic variance and spatial autocorrelation.
  #
  #     # Ordination and distance-based summaries.
  #     pcaone: true            # Fast PCA from the final PLINK SNP dataset.
  #     emupca: false           # Standalone EMU PCA for low-coverage or uncertain genotypes.
  #     pcaone_emu: false       # PCAone EMU mode for PCA with missing genotype modelling.
  #     pcaone_miss: false      # PCAone sensitivity runs across missing-data thresholds.
  #     vcf2pcacluster: false   # PCA/clustering with VCF2PCACluster internal SNP filters.
  #     gen_dist: true          # Pairwise Euclidean and p-distance matrices from SNP genotypes.
  #     pcoa: true              # Principal coordinates analysis from the Euclidean distance matrix.
  #     neighbornet: true       # Split network from p-distance genetic distances.
  #
  #     # Diversity, relatedness, spatial, and phylogenetic analyses.
  #     pixy: true              # Nucleotide diversity, FST, and dXY from variant/invariant sites.
  #     relatedness: true       # Pairwise kinship/IBD estimates and relatedness network plots.
  #     roh: false              # Runs of homozygosity calls and group summaries.
  #     amova: true             # AMOVA variance partitioning across metadata strata.
  #     mapi: false             # Spatial MAPI maps of unusually high/low genetic distances.
  #     genome_scan: false      # Sliding-window FST, pi, and dXY between two metadata groups.
  #     iqtree: false           # Maximum-likelihood phylogeny from the ipyrad PHYLIP alignment.
  #     iqtree_trimal: false    # trimAl alignment trimming followed by IQ-TREE inference.
  #     iqtree_robust: false    # Robust IQ-TREE output selection based on support threshold.
  #     fineradstructure: false # RADpainter/fineRADstructure coancestry and clustering.
  #     treemix: false          # OrientAGraph historical population graph with migration edges.
  #
  #   parameters:
  #     <<: *global_params
  #     popmap: "data/my_study/popmap.txt"
  #     popdata: "data/my_study/popdata.txt"
  #
  #     # Metadata columns below must exist in indpopdata/popdata, with exact spelling/case.
  #     # Common choices: Site, Region, Region2, ElevationBand, Habitat.
  #     k_values: [1, 2, 3, 4, 5, 6]
  #
  #     # Preprocessing overrides, shown in the same order as the pipeline.
  #     # 1. `samples` above optionally subsets individuals before all filters.
  #     # 2. Relatedness filtering optionally removes close relatives before variant filters.
  #     relatedness_filtering:
  #       enabled: false
  #       king_threshold: 0.0884
  #       mac_threshold: 1
  #       group_by: ["Region"]
  #
  #     # 3. Variant missingness, then biallelic SNP + MAF filtering.
  #     vcf_filtering:
  #       f_missing: 0.5
